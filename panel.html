<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCD Pro · Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEDEA;--surface:#FFFFFF;--ink:#1A2B27;--muted:#6E7A77;--line:#E0E0DA;
    --esc:#0F766E;--esc-soft:#E2F3F0;--esc-d:#0B4A45;--orange:#E8620A;--bad:#B91C1C;
    --ok:#15803D;--ok-soft:#E6F4EA;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Barlow',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono',monospace}
  .shell{display:flex;min-height:100vh}

  .sidebar{width:240px;background:#fff;border-right:1px solid var(--line);flex:none;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .brand .wm{font-weight:900;font-size:22px;letter-spacing:-.01em;color:var(--esc-d);line-height:1}
  .brand .wm b{color:var(--orange)}
  .brand .gestor{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);margin-top:6px}
  .nav{padding:10px 10px 20px;flex:1}
  .grp{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#A6AFAC;padding:12px 12px 5px}
  .navitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;color:#33403c;font-weight:500;margin-bottom:1px}
  .navitem:hover{background:#F3F3EF}
  .navitem.active{background:var(--esc-soft);color:var(--esc-d);font-weight:700}
  .navitem .ic{width:7px;height:7px;border-radius:2px;background:#C9C9C1;flex:none}
  .navitem.active .ic{background:var(--esc)}
  .sfoot{padding:12px 14px;border-top:1px solid var(--line)}
  .logout{width:100%;background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px;font-family:'Barlow';font-size:13px;font-weight:600;cursor:pointer}
  .logout:hover{background:#F3F3EF;color:var(--bad)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:var(--esc);color:#fff;display:flex;align-items:center;gap:14px;padding:13px 22px;position:sticky;top:0;z-index:5}
  .topbar .mt{font-size:17px;font-weight:700}
  .topbar .spacer{flex:1}
  .topbar .me{font-size:12.5px;text-align:right;line-height:1.25}
  .topbar .me small{opacity:.85;font-size:10.5px;font-family:'JetBrains Mono',monospace}
  .hamb{display:none;background:none;border:none;color:#fff;font-size:20px;cursor:pointer}

  .content{padding:22px;flex:1}
  .loading{text-align:center;color:var(--muted);padding:60px;font-family:'JetBrains Mono',monospace;font-size:13px}
  .placeholder{background:#fff;border:1px solid var(--line);border-radius:14px;padding:48px 24px;text-align:center;max-width:560px;margin:30px auto}
  .placeholder .big{font-size:20px;font-weight:800;color:var(--esc-d)}
  .placeholder p{color:var(--muted);font-size:14px;margin-top:8px}
  .chips{display:flex;gap:6px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .chip{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:4px 10px;border-radius:999px;background:#EEEEEA;color:var(--muted)}
  .chip.on{background:var(--esc-soft);color:var(--esc)}

  /* ===== Componentes reutilizables para los modulos ===== */
  .mcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;max-width:760px}
  .mcard h3{margin:0 0 4px;font-size:16px;font-weight:800;color:var(--ink)}
  .mcard .lead{color:var(--muted);font-size:13.5px;margin:0 0 16px}
  .tabbar{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .tab{font-family:'JetBrains Mono',monospace;font-size:12px;border:none;background:none;color:var(--muted);padding:9px 11px;cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--esc);border-bottom-color:var(--esc)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-family:'Barlow';font-size:14px;background:#fff}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--esc);border-color:var(--esc)}
  .field input[readonly]{background:#F4F4F1;color:var(--muted)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}
  .btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:9px;padding:10px 16px;font-family:'Barlow';font-size:13.5px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--esc);color:#fff}.btn.primary:hover{background:var(--esc-d)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.sm{padding:7px 12px;font-size:12.5px}
  .btn:disabled{opacity:.5;cursor:default}
  .note{background:var(--esc-soft);border:1px solid #C4E3DD;border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--esc-d);margin-top:8px}
  .note.warn{background:#FBF1DD;border-color:#E7CFA0;color:#7C4A12}
  .toast{display:none;align-items:center;gap:8px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--ok)}
  .toast.show{display:inline-flex}
  .toast .d{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .logo-box{width:150px;height:84px;border:1.5px dashed #C2D0CD;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;text-align:center;overflow:hidden;background:#FAFAF8}
  .logo-box img{max-width:100%;max-height:100%;object-fit:contain}
  table.mtable{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px}
  table.mtable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:600;padding:9px 8px;border-bottom:1px solid var(--line)}
  table.mtable td{padding:10px 8px;border-bottom:1px solid #F0F0EC;vertical-align:middle}
  table.mtable tr:last-child td{border-bottom:none}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10.5px;font-weight:600;font-family:'JetBrains Mono',monospace}
  .badge.ok{background:var(--ok-soft);color:var(--ok)}
  .badge.off{background:#EEEEEA;color:var(--muted)}
  .badge.warn{background:#FEF3C7;color:#B45309}
  .badge.danger{background:#FEE2E2;color:#B91C1C}
  .rowbtns{display:flex;gap:6px;justify-content:flex-end}
  .empty{color:var(--muted);font-size:13px;padding:18px 4px;text-align:center}
  .cellnum{width:120px;text-align:right;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-family:'JetBrains Mono',monospace;font-size:13px}
  .cellnum:focus{outline:2px solid var(--esc);border-color:var(--esc)}
  .chk{display:flex;align-items:flex-start;gap:9px;font-weight:400;margin:7px 0;cursor:pointer;line-height:1.35}
  .chk input{width:17px;height:17px;margin:1px 0 0;flex:0 0 auto;accent-color:var(--esc)}
  .chk span{flex:1}
  /* Avisos propios de la app */
  .rcdtoast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;transition:.22s;z-index:80;background:var(--esc-d);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 10px 34px rgba(0,0,0,.22);max-width:90vw;text-align:center}
  .rcdtoast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .rcdtoast.error{background:var(--bad)}
  .rcdtoast.info{background:var(--ink)}
  .rcdmodal{position:fixed;inset:0;background:rgba(20,30,28,.45);display:none;align-items:center;justify-content:center;z-index:85;padding:20px}
  .rcdmodal.show{display:flex}
  .rcdm-card{background:#fff;border-radius:16px;padding:22px 22px 18px;max-width:380px;width:100%;box-shadow:0 22px 64px rgba(0,0,0,.3)}
  .rcdm-msg{font-size:15px;color:var(--ink);line-height:1.5;margin-bottom:20px}
  .rcdm-btns{display:flex;gap:10px;justify-content:flex-end}

  @media(max-width:820px){
    .sidebar{position:fixed;z-index:30;left:0;top:0;transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.2)}
    .shell.open .sidebar{transform:none}
    .hamb{display:block}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:20}
    .shell.open .scrim{display:block}
  }
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="scrim" onclick="toggleNav()"></div>
  <aside class="sidebar">
    <div class="brand"><div class="wm">RCD <b>Pro</b></div><div class="gestor" id="gestorNombre">...</div></div>
    <nav class="nav" id="nav"><div class="loading">Cargando menu...</div></nav>
    <div class="sfoot"><button class="logout" onclick="salir()">Cerrar sesion</button></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="hamb" onclick="toggleNav()">&#9776;</button>
      <span class="mt" id="mt">Panel</span><span class="spacer"></span><span class="me" id="me"></span>
    </div>
    <div class="content" id="content"><div class="loading">Cargando...</div></div>
  </div>
</div>

<div id="rcdToast" class="rcdtoast"></div>
<div id="rcdModal" class="rcdmodal">
  <div class="rcdm-card">
    <div class="rcdm-msg"></div>
    <div class="rcdm-btns">
      <button class="btn ghost rcdm-cancel">Cancelar</button>
      <button class="btn primary rcdm-ok">Confirmar</button>
    </div>
  </div>
</div>

<!-- ===== MODULOS (cada uno en su archivo) ===== -->
<script src="mod-parametros.js"></script>
<script src="mod-clientes.js"></script>
<script src="mod-volqueteros.js"></script>
<script src="mod-aliados.js"></script>
<script src="mod-cotizaciones.js"></script>
<script src="mod-solicitudes.js"></script>
<script src="mod-pesaje.js"></script>
<script src="mod-inventario.js"></script>
<script src="mod-produccion.js"></script>
<script src="mod-despacho.js"></script>
<script src="mod-precios.js"></script>
<script src="mod-liquidacion.js"></script>
<script src="mod-facturacion.js"></script>

<script>
  const SUPABASE_URL  = "https://ymzxjuncantobxeftfqd.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltenhqdW5jYW50b2J4ZWZ0ZnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzM0ODUsImV4cCI6MjA5MjgwOTQ4NX0.p1K6pvZy-Agb2J-mKF2MNR5ujrTfRjmvtTyP3QiIzu8";
  const headers = {'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON};
  const $ = id => document.getElementById(id);

  const ses = JSON.parse(sessionStorage.getItem('rcd_sesion') || 'null');
  if(!ses){ window.location.href = 'index.html'; }

  let MENU = [];

  // Contexto que reciben los modulos
  const RCD = {
    ses,
    url: SUPABASE_URL,
    headers,
    rpc: (fn, body) => fetch(SUPABASE_URL+'/rest/v1/rpc/'+fn, {method:'POST', headers, body:JSON.stringify(body||{})}).then(r=>r.json()),
    can: (clave, accion) => { const m = MENU.find(x=>x.clave===clave); return m ? !!m[accion] : false; }
  };

  // Aviso tipo toast (ok / error / info)
  RCD.toast = function(msg, tipo){
    const t = $('rcdToast');
    t.className = 'rcdtoast ' + (tipo || 'ok');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(RCD._tt);
    RCD._tt = setTimeout(()=>t.classList.remove('show'), 3000);
  };

  // Confirmacion con modal (devuelve Promise<boolean>)
  RCD.confirm = function(msg, opts){
    opts = opts || {};
    return new Promise(resolve=>{
      const ov = $('rcdModal');
      ov.querySelector('.rcdm-msg').textContent = msg;
      ov.querySelector('.rcdm-ok').textContent = opts.ok || 'Confirmar';
      ov.querySelector('.rcdm-cancel').textContent = opts.cancel || 'Cancelar';
      ov.classList.add('show');
      const cerrar = val => {
        ov.classList.remove('show');
        ov.querySelector('.rcdm-ok').onclick = null;
        ov.querySelector('.rcdm-cancel').onclick = null;
        resolve(val);
      };
      ov.querySelector('.rcdm-ok').onclick = ()=>cerrar(true);
      ov.querySelector('.rcdm-cancel').onclick = ()=>cerrar(false);
    });
  };

  async function init(){
    $('me').innerHTML = ses.nombre + '<small>' + ses.rol + '</small>';
    try{
      const g = await RCD.rpc('rcd_gestor', {p_gestor_id: ses.gestor_id});
      if(Array.isArray(g) && g.length) $('gestorNombre').textContent = g[0].nombre;
    }catch(e){ $('gestorNombre').textContent = ''; }

    try{ MENU = await RCD.rpc('rcd_menu', {p_usuario_id: ses.id}); }catch(e){ MENU = []; }

    if(!Array.isArray(MENU) || MENU.length===0){
      $('nav').innerHTML = '<div class="loading">Sin modulos asignados.<br>Pide permisos al administrador.</div>';
      $('content').innerHTML = '<div class="placeholder"><div class="big">Sin acceso a modulos</div><p>Tu usuario aun no tiene modulos asignados.</p></div>';
      return;
    }
    renderNav();
    abrir(MENU[0].clave);
  }

  function renderNav(){
    let html='', g='';
    MENU.forEach(m=>{
      if(m.grupo!==g){ g=m.grupo; html+='<div class="grp">'+g+'</div>'; }
      html+='<div class="navitem" data-c="'+m.clave+'" onclick="abrir(\''+m.clave+'\')"><span class="ic"></span>'+m.nombre+'</div>';
    });
    $('nav').innerHTML = html;
  }

  function abrir(clave){
    const m = MENU.find(x=>x.clave===clave);
    if(!m) return;
    document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active', n.dataset.c===clave));
    $('mt').textContent = m.nombre;
    $('shell').classList.remove('open');
    window.scrollTo({top:0,behavior:'smooth'});
    const content = $('content');
    if(window.RCD_MODULOS && window.RCD_MODULOS[clave]){
      content.innerHTML = '';
      window.RCD_MODULOS[clave](content, RCD);
    } else {
      content.innerHTML =
        '<div class="placeholder"><div class="big">'+m.nombre+'</div>'+
        '<p>Este modulo se construye en su grupo.</p>'+
        '<div class="chips">'+
          '<span class="chip '+(m.ver?'on':'')+'">Ver</span>'+
          '<span class="chip '+(m.escribir?'on':'')+'">Escribir</span>'+
          '<span class="chip '+(m.editar?'on':'')+'">Editar</span>'+
          '<span class="chip '+(m.eliminar?'on':'')+'">Eliminar</span>'+
        '</div></div>';
    }
  }

  function salir(){ sessionStorage.removeItem('rcd_sesion'); window.location.href='index.html'; }
  function toggleNav(){ $('shell').classList.toggle('open'); }

  init();
</script>
</body>
</html>
